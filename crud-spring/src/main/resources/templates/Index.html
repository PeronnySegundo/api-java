<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Backend - Lista de Pessoas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            color: white;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .card {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            margin-bottom: 30px;
        }

        .card-header {
            background-color: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #eaeaea;
        }

        .card-title {
            font-size: 1.5rem;
            color: #343a40;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-body {
            padding: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: #4361ee;
            color: white;
        }

        .btn-primary:hover {
            background-color: #3a56d4;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #f8f9fa;
            color: #495057;
            border: 1px solid #dee2e6;
        }

        .btn-secondary:hover {
            background-color: #e9ecef;
        }

        .btn-success {
            background-color: #38b000;
            color: white;
        }

        .btn-success:hover {
            background-color: #2f9400;
        }

        .btn-danger {
            background-color: #e5383b;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c1121f;
        }

        .people-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .person-card {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-left: 4px solid #4361ee;
        }

        .person-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        .person-name {
            font-size: 1.3rem;
            color: #212529;
            margin-bottom: 10px;
        }

        .person-detail {
            display: flex;
            margin-bottom: 8px;
            color: #495057;
        }

        .detail-label {
            font-weight: 600;
            min-width: 80px;
            color: #6c757d;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #4361ee;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            padding: 20px;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .people-list {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Teste de Backend</h1>
        <p class="subtitle">Sistema de visualização de dados de pessoas</p>
    </header>

    <main>
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    Lista de Pessoas
                </h2>
            </div>
            <div class="card-body">
                <div class="controls">
                    <button class="btn-primary" onclick="fetchPeople()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
                            <path d="M21 3v5h-5"></path>
                            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
                            <path d="M8 16H3v5"></path>
                        </svg>
                        Buscar Pessoas
                    </button>
                    <button class="btn-success" onclick="simulateAddPerson()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 5v14"></path>
                            <path d="M5 12h14"></path>
                        </svg>
                        Adicionar Pessoa
                    </button>
                    <button class="btn-danger" onclick="clearList()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        Limpar Lista
                    </button>
                </div>

                <div id="people-list" class="people-list">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Clique em "Buscar Pessoas" para carregar os dados</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Desenvolvido para teste de backend • © 2023</p>
    </footer>
</div>

<script>
    // URL do seu backend - atualize conforme necessário
    const API_URL = 'https://seu-backend.com/api/pessoas';

    // Função para buscar pessoas do backend
    async function fetchPeople() {
        const peopleList = document.getElementById('people-list');
        peopleList.innerHTML = `
            <div class="loading">
                <div class="spinner"></div>
                <p>Carregando dados...</p>
            </div>
        `;

        try {
            // Simulação de chamada à API - substitua pela chamada real ao seu backend
            // const response = await fetch(API_URL);
            // const people = await response.json();

            // Simulação enquanto seu backend não está pronto
            await new Promise(resolve => setTimeout(resolve, 1500));
            const people = getMockPeople();

            displayPeople(people);
        } catch (error) {
            peopleList.innerHTML = `
                <div class="loading">
                    <p style="color: #e5383b;">Erro ao carregar dados: ${error.message}</p>
                </div>
            `;
        }
    }

    // Função para exibir pessoas na lista
    function displayPeople(people) {
        const peopleList = document.getElementById('people-list');

        if (people.length === 0) {
            peopleList.innerHTML = `
                <div class="loading">
                    <p>Nenhuma pessoa encontrada.</p>
                </div>
            `;
            return;
        }

        peopleList.innerHTML = '';

        people.forEach(person => {
            const personCard = document.createElement('div');
            personCard.className = 'person-card';
            personCard.innerHTML = `
                <h3 class="person-name">${person.nome}</h3>
                <div class="person-detail">
                    <span class="detail-label">Idade:</span>
                    <span>${person.idade} anos</span>
                </div>
                <div class="person-detail">
                    <span class="detail-label">Email:</span>
                    <span>${person.email}</span>
                </div>
                <div class="person-detail">
                    <span class="detail-label">Cargo:</span>
                    <span>${person.cargo}</span>
                </div>
                <div class="person-detail">
                    <span class="detail-label">Cidade:</span>
                    <span>${person.cidade}</span>
                </div>
            `;
            peopleList.appendChild(personCard);
        });
    }

    // Função para limpar a lista
    function clearList() {
        const peopleList = document.getElementById('people-list');
        peopleList.innerHTML = `
            <div class="loading">
                <p>Lista limpa. Clique em "Buscar Pessoas" para carregar os dados.</p>
            </div>
        `;
    }

    // Função para simular adição de pessoa (para teste)
    function simulateAddPerson() {
        alert("Esta função enviaria dados para o backend. Em uma implementação real, isso adicionaria uma nova pessoa.");
    }

    // Dados mockados para teste - substitua pelos dados reais do seu backend

            },
            {

            }

    }
</script>
</body>
</html>
